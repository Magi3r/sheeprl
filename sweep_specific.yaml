method: bayesian
metric:
  name: Rewards/rew_avg
  goal: maximize

# early_terminate:
#   type: none
#   max_iter: 100000

parameters:
  seed:
    values: [0,1]

  episodic_memory.capacity:
    value: 512 ## 1024 was default, so should be investigated

  episodic_memory.prune_fraction:
    value: 0.20
    
  episodic_memory.std_multiplier:
    value: 1

  episodic_memory.fill_parallel_to_buffer:
    value: true
  
  episodic_memory.use_acd:
    values: [true, false]
  
  episodic_memory.adc_weighting:
    value: true

  episodic_memory.replace_by_acd:
    value: false
  
program: sheeprl.py
command: 
  - ${env}
  - uv
  - run
  - ${program}
  - exp=dem_100k_breakout
  - algo=dem
  - fabric.accelerator=cuda
  - ${args_no_hyphens}